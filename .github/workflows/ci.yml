# CI mínimo — análise noturna 09/06/2026 (achado: 5 testes red por 6 semanas
# sem ninguém notar). Reforçado 24/jun/2026: typecheck nos 3 workspaces + ratchet de lint.
#
# Gates (falham o build):
#   - typecheck (web, shared, mobile);
#   - testes dos 3 workspaces (shared, web, mobile);
#   - lint do web via RATCHET (web/scripts/lint-ci.mjs): falha se a contagem de erros
#     SUBIR acima do baseline (559). NÃO exige limpar a dívida antiga (559 erros em 161
#     arquivos) — só impede dívida NOVA. Limpa-se baixando o baseline conforme reduz.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck (web)
        run: npm run typecheck --workspace=web

      - name: Typecheck (shared)
        run: npx tsc --noEmit
        working-directory: shared

      - name: Typecheck (mobile)
        run: npx tsc --noEmit
        working-directory: mobile

      - name: Tests (shared)
        run: npm run test --workspace=shared

      - name: Tests (web)
        run: npm run test:run --workspace=web

      - name: Tests (mobile)
        run: npm run test --workspace=mobile

      - name: Lint (web) — ratchet (trava dívida NOVA)
        run: node scripts/lint-ci.mjs
        working-directory: web
