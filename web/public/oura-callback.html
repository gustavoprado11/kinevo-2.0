<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinevo · Conectando Oura</title>
<style>
body{font-family:-apple-system,system-ui,'Segoe UI',Roboto,sans-serif;background:#0a0a0b;color:#fafafa;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:24px;text-align:center;line-height:1.5}
.card{max-width:360px}
.icon{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#0d9488,#14b8a6);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px}
h1{font-size:22px;font-weight:800;margin:0 0 8px;letter-spacing:-0.4px}
p{font-size:14px;color:#a1a1aa;margin:0 0 20px}
.spinner{width:28px;height:28px;border:3px solid rgba(20,184,166,0.2);border-top-color:#14b8a6;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.fallback{font-size:12px;color:#71717a;margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.06)}
.fallback a{color:#14b8a6;text-decoration:none;font-weight:700}
.error{display:none;color:#f87171;font-size:13px;margin-top:12px}
</style>
</head>
<body>
<div class="card">
<div class="icon">💍</div>
<div class="spinner"></div>
<h1>Conectando com o Kinevo…</h1>
<p>Redirecionando você de volta pro app. Se nada acontecer em alguns segundos, toque no botão abaixo.</p>
<p class="fallback"><a id="manual" href="#">Abrir Kinevo manualmente →</a></p>
<p class="error" id="error">Houve um erro no Oura. Volte ao app e tente conectar novamente.</p>
</div>
<script>
(function(){
  var params = window.location.search.slice(1);
  var hasCode = /[?&]?code=/.test(params);
  var hasError = /[?&]?error=/.test(params);

  if (hasError) {
    document.querySelector('.spinner').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    return;
  }

  if (!hasCode) {
    document.querySelector('.spinner').style.display = 'none';
    document.querySelector('h1').textContent = 'Página vazia';
    document.querySelector('p').textContent = 'Acesse essa página pelo Kinevo durante a conexão com o Oura.';
    return;
  }

  var target = 'kinevo://oura-callback?' + params;
  document.getElementById('manual').href = target;
  setTimeout(function(){ window.location = target; }, 400);
})();
</script>
</body>
</html>
